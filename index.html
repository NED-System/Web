    content="NED - Disfruta el poder de la Lealtad. Únete a la plataforma de fidelización para consumidores y negocios." />

    content="lealtad, fidelización, negocios, descuentos, sorteos, referidos, marketplace, plan-de-puntos" />
  <meta property="og:title" content="NED - Disfruta el poder de la Lealtad" />
  <meta property="og:description" content="Únete a la plataforma de fidelización para consumidores y negocios." />
  <meta property="og:image" content="/assets/logo/Logo_NED_ico.png" />

  <link rel="stylesheet" href="/styles/style.css?v=5.3" />
  <link rel="icon" href="/assets/logo/Logo_NED_ico.png" />
  <link rel="apple-touch-icon" href="/assets/logo/Logo_NED_ico.png" />
  <!-- Brevo Conversations {literal} -->

    (function (d, w, c) {
      w.BrevoConversationsID = "6400fe62de13f029ac4c064c";
      w[c] =
        w[c] ||
        function () {
          (w[c].q = w[c].q || []).push(arguments);
        };
      var s = d.createElement("script");
      s.async = true;

<body>
  <!-- Header placeholder -->
  <div id="header-placeholder"></div>

  <main>
    <section class="poderL" aria-labelledby="poder_title">
      <span class="hero-badge">CONEXIÓN NEGOCIO - CLIENTE</span>
      <h1 id="poder_title">DISFRUTA EL PODER DE LA LEALTAD</h1>
    </section>

    <section class="usuarios" id="usuarios" aria-labelledby="usuarios-title">
      <div class="usuarios-grid">
        <!-- PORTAL CONSUMIDOR -->
        <a href="/pages/consumidores.html" class="usuarios-card-link">
          <div class="usuarios-card consumers-card">
            <h3 class="h3__usuarios" id="consumidores-title">CONSUMIDOR</h3>
            <div class="icon-container">
              <img class="flecha__usuarios" src="/assets/Inicio/icons8-expand-arrow-50.png" alt="flecha hacia abajo"
                width="40" height="40" loading="eager" />
            </div>
            <div class="img-wrapper">
              <img class="img__seccion" id="ima__consumidor" src="/assets/Inicio/consumidores-3.png"
                alt="Ilustración de consumidores" width="300" height="300" loading="eager" />
            </div>
            <div class="card-btn">Vamos <span class="arrow">→</span></div>
          </div>
        </a>

        <!-- PORTAL NEGOCIO -->
        <a href="/pages/negocios.html" class="usuarios-card-link">
          <div class="usuarios-card businesses-card">
            <h3 class="h3__usuarios" id="negocios_title">NEGOCIO</h3>
            <div class="icon-container">
              <img class="flecha__usuarios" src="/assets/Inicio/icons8-expand-arrow-50.png" alt="flecha hacia abajo"
                width="40" height="40" loading="eager" />
            </div>
            <div class="img-wrapper">
              <img class="img__seccion" id="ima__negocio" src="/assets/Inicio/negocios-3.png"
                alt="Ilustración de negocios" width="300" height="300" loading="eager" />
            </div>
            <div class="card-btn">Quiero crecer <span class="arrow">→</span></div>
          </div>
        </a>
      </div>
    </section>

    <!-- SECCIÓN DESCARGA PREMIUM -->
    <section class="lista_espera" aria-labelledby="lista-espera-title">
      <div class="lista__espera__div yellow_theme">
        <h2 id="lista-espera-title">
          GANA Y CRECE CON EL PODER DE LA LEALTAD
        </h2>
        <p>Disponible para Android e iOS. Consigue la aplicación y comienza a disfrutar del poder de la fidelización.
        </p>
        <div class="cta_btn_container">
          <button class="unirme_button main_download_btn" onclick="downloadApp()" aria-label="Descargar la aplicación">
            Descarga la app
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>

  <!-- The hamburger menu functionality is now handled in header.js -->
</body>

</html>

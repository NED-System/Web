<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NED - Política de Eliminación de Datos. Conoce cómo puedes solicitar de manera previa, expresa e informada la revocatoria de la autorización y la supresión de tus datos personales.">
    <!-- Meta etiquetas para evitar el caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="manifest" href="/manifest.json">
    <title>NED - Política de Eliminación de Datos</title>
    <link rel="stylesheet" href="/styles/style.css?v=5.9">
    <link rel="stylesheet" href="/styles/legal.css?v=5.9">
    <link rel="icon" href="/assets/logo/Logo_NED_ico.png">
    <link rel="apple-touch-icon" href="/assets/logo/Logo_NED_ico.png">
    
    <!-- Brevo Conversations {literal} -->
    <script>
        (function(d, w, c) {
            w.BrevoConversationsID = '6400fe62de13f029ac4c064c';
            w[c] = w[c] || function() {
                (w[c].q = w[c].q || []).push(arguments);
            };
            var s = d.createElement('script');
            s.async = true;
            s.src = 'https://conversations-widget.brevo.com/brevo-conversations.js';
            if (d.head) d.head.appendChild(s);
        })(document, window, 'BrevoConversations');
    </script>
    <!-- /Brevo Conversations {/literal} -->
    
    <!-- Include component scripts -->
    <script src="/components/header.js" defer></script>
    <script src="/components/footer.js" defer></script>
    <script src="/scripts/animations.js?v=5.9" defer></script>
    <script src="/scripts/register-sw.js" defer></script>
    
    <!-- Marked Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>

    <main class="legal-main">
        <div class="legal-container">
            <article class="legal-card animate-on-scroll">
                <div id="legal-content">
                    <!-- Pulsing skeleton loading state -->
                    <div class="legal-skeleton">
                        <div class="skeleton-title"></div>
                        <div class="skeleton-group">
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-group">
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-group">
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Script to dynamically load and parse Markdown -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contentEl = document.getElementById("legal-content");
            
            // Adjust options for marked
            marked.setOptions({
                breaks: true,
                gfm: true
            });

            // Fetch the Markdown legal text
            fetch("eliminadatos.md")
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`No se pudo cargar el documento: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(markdownText => {
                    // Inject and parse Markdown
                    contentEl.innerHTML = marked.parse(markdownText);
                })
                .catch(error => {
                    console.error("Error al cargar la política de eliminación de datos:", error);
                    contentEl.innerHTML = `
                        <div class="legal-error">
                            <h3>¡Ups! No se pudo cargar el contenido</h3>
                            <p>Tuvimos un inconveniente al cargar el documento legal. Por favor, intenta de nuevo o escríbenos directamente a <a href="mailto:info@ned.mobi">info@ned.mobi</a>.</p>
                            <button class="btn-retry" onclick="window.location.reload()">Reintentar</button>
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
